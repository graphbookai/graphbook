name: Publish Graphbook to PyPI

on:
  workflow_dispatch:

jobs:
  pypi:
    runs-on:
      group: larger-runners
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build and Publish
        run: |
          make package
          uv publish --token ${{ secrets.PYPI_PASSWORD }}
